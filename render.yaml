services:
  # ──────────────────────────────────────────────
  # Backend: FastAPI Python Web Service
  # ──────────────────────────────────────────────
  - type: web
    name: edupredict-api
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # ──────────────────────────────────────────────
  # Frontend: Vue 3 Vite Static Site
  # ──────────────────────────────────────────────
  - type: web
    name: edupredict-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://edupredict-api.onrender.com
